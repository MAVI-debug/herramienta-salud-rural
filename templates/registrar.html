{% extends "base.html" %}
{% block title %}Registrar TSR — TSR{% endblock %}
{% block contenido %}
<div class="registro-page">
    <a href="/dashboard" class="btn-retorno" style="margin-bottom:0">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Volver al Panel
    </a>
    <div class="registro-card">
        <div class="registro-header">
            <div class="registro-icono">👥</div>
            <h2>Registrar TSR</h2>
            <p class="registro-sub">Crear acceso para un nuevo Técnico en Salud Rural.</p>
        </div>
        <form method="POST" class="registro-form">
            <label for="nombre_completo">Nombre Completo</label>
            <input type="text" name="nombre_completo" id="nombre_completo" placeholder="Ej: María López" required autofocus>

            <label for="usuario">Nombre de Usuario</label>
            <input type="text" name="usuario" id="usuario" placeholder="Ej: tsr_totonicapan" required>

            <label for="contrasena">Contraseña</label>
            <input type="password" name="contrasena" id="contrasena" placeholder="••••••••" required>

            <label for="area_salud">Área de Salud</label>
            <input type="text" name="area_salud" id="area_salud" placeholder="Ej: TOTONICAPÁN" required>

            <label for="distrito_salud">Distrito de Salud</label>
            <input type="text" name="distrito_salud" id="distrito_salud" placeholder="Ej: TOTONICAPÁN" required>

            <label for="cargo">Cargo</label>
            <input type="text" name="cargo" id="cargo" value="Técnico en Salud Rural (TSR)">

            <button type="submit">Registrar TSR</button>
        </form>
    </div>
</div>
{% endblock %}
